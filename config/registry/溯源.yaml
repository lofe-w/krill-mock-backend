# 溯源 + 检测 注册表（B · 人工固定）
# 依据：domain.md §5（value={类别,溯源链条}，数据归各环节、引用不复制）
#       数据字典 §5/§6 / 甲方 6.x（权威）/ 前端附录 A（环节序列）
# 注意：不跟三方接口把"原料来源追溯/产品检验"拍平成顶层字段的做法——
#       捕捞信息归"磷虾捕捞"环节，检验归"产品检测"环节。

# ============ B · 溯源 ============
- key: 溯源
  表: B
  成熟度: 人工固定                 # Fake 阶段配置喂；结构 = 回溯产出结构
  filter: [商品编号]
  # 环节序列（按产品类别，路径长短不同；不为 7 类各写一套逻辑）
  环节顺序:
    全脂虾粉: [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 产品检测]
    冻虾:     [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 产品检测]
    虾肉:     [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 产品检测]
    虾油:     [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 虾油提取, 产品检测]
    脱脂虾粉: [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 虾油提取, 产品检测]
    虾油胶囊: [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 虾油提取, 胶囊封装, 产品检测]
    蛋白肽:   [磷虾捕捞, 船载加工, 冷链运输, 岸基存储, 虾油提取, 蛋白肽加工, 产品检测]
  条目:
    - filter: { 商品编号: QZXF-001 }
      value:
        类别: 全脂虾粉溯源
        溯源链条:                  # 每个环节 = 批次编号 + 本环节数据；过程数据用引用
          磷虾捕捞:                # 捕捞环节自带捕捞信息（即三方接口拍平的"原料来源追溯"）
            批次编号: LXBL-2026-001
            捕捞海域: { 经度: 120.5, 纬度: 35.2 }
            捕捞方式: 拖网捕捞
            捕捞时间: "2026-06-15 08:00:00"
            数据来源: 远洋捕捞加工在线监测系统
            原料溯源: null          # 虾油/蛋白肽时可递归→上游虾粉批号
          船载加工:
            批次编号: CZJG-2026-001
            引用: [船舶.虾粉线.打包.当天累计重量, 船舶.虾粉线.工艺读数]   # 不抄独立值
          冷链运输:
            批次编号: LYYS-2026-001
            引用: [船舶.冻虾舱.温度]   # 冷链温湿度（按舱 C；如需按批号曲线→潜在 D）
          岸基存储:
            批次编号: AJCC-2026-001
            到达岸基冷库时间: "2026-06-18 06:00:00"
          产品检测:                # 检测环节自带检验（即三方接口拍平的"产品检验"）
            批次编号: QZXF-001
            引用: { key: 检测, filter: { 产品: 全脂虾粉, 批次: QZXF-001 } }
    # 其余 6 类（冻虾/虾肉/虾油/虾油胶囊/脱脂虾粉/蛋白肽）按 溯源类别环节 同构补全

# ============ B · 检测（被溯源/物流环节引用） ============
- key: 检测
  表: B
  成熟度: 人工固定
  filter: [产品, 批次]
  条目:
    - filter: { 产品: 全脂虾粉, 批次: QZXF-001 }
      value:
        检测报告编号: JYBG-XF-2026-001
        检测项目: { 感官指标: 正常, 粗蛋白质: "62.5%", 粗脂肪: "8.3%", 水分: "7.2%",
                   灰分: "15.1%", 盐分: "3.5%", 有机污染物指标: 未检出, 微生物指标: 合格 }
        检测结论: 合格
        检测机构: XX检测中心
        检测时间: "2026-06-12"
        是否第三方检测: true
    - filter: { 产品: 虾油, 批次: XYTQ-2026-001 }
      value:
        检测报告编号: JYBG-XY-2026-001
        检测项目: { 磷脂: "35.2%", EPA: "28.5%", DHA: "15.3%", 虾青素: "0.15%", 酸价: "2.5mgKOH/g", 含水率: "0.3%", 钠含量: "0.05%" }
        检测结论: 合格
        检测机构: XX检测中心
        检测时间: "2026-06-17"
        是否第三方检测: true
  说明: 检测项目取自成分字典子集（数据字典 §5.2），跨产品复用同名指标。
