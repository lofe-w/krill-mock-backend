# ★编号方案（照金蝶真实规则，让假数据"像真"）：
#   产品批号 = {年月YYMM}{产品3字母码}{2位序}：
#     AKO 磷虾油 · ASO 上清液油 · AKP 脱脂虾粉（金蝶真实缩写）
#     AKM 全脂虾粉 · AKF 冻虾 · AKR 虾肉 · AKC 虾油胶囊 · AKT 蛋白肽（同风格扩展）
