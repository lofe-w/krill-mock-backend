# 溯源 + 检测 注册表（B · 人工固定）
# 依据：domain.md §5 / 数据字典 §6 / 甲方《数据内容列表》第6章（权威）/ 金蝶 ERP 探测真实数据（mozi-int/scout）
#
# ════════════════════════════════════════════════════════════════════════════
# ★ 链条结构与字段名严格对齐甲方第6章（6.1~6.7 七类产品溯源）：
#   环节命名与顺序照 6.x 小节；各环节字段照 6.x 表格（"引用"环节回到 3/4/5 章对应表）。
#   · 磷虾捕捞   (6.x.1)：捕捞日期 / 捕捞海域（经纬度）/ 捕捞方式
#   · 船载加工   (6.x.2)：虾粉/虾油线=4.1.2；冻虾线=4.2.2；虾肉线=6.3.2
#   · 冷链运输   (6.x.3)：捕捞船冷库储存温度/湿度 · 货物转运日期 · 运输船冷库储存温度/湿度
#   · 岸基仓储   (6.x.4)：到达岸基冷库日期 · 岸基冷库储存温度/湿度 · 到达厂内冷库日期 · 厂内冷库储存温度/湿度
#   · 产品检测   (各产品)：全脂虾粉=4.1.4 · 冻虾=4.2.4 · 虾肉=4.3.4 · 脱脂虾粉=5.1.5 · 成品虾油=5.1.6
#   · 虾油提取生产线 (6.4.6/6.6.6)：6.x.6.1 工厂信息 + 6.x.6.2 设备信息（虾油线含 MVR/醇沉/浓缩；脱脂虾粉线含盘式干燥机）
#   · 虾油胶囊封装 (6.5.8)：封装生产时间 · 封装工厂经纬度/地址/编号 · 典型年产量
#   · 蛋白肽生产线 (6.7.8.2)：进料预处理 / 酶解 / 三效浓缩 / 喷雾干燥 / 肽产品 / 渣粉
#
# ★ 七类链条（6.1~6.7，严格照甲方目录）：
#   全脂虾粉 : 磷虾捕捞→船载加工→冷链运输→岸基仓储→全脂虾粉产品检测
#   冻虾     : 磷虾捕捞→船载加工→冷链运输→岸基仓储→冻虾产品检测
#   虾肉     : 磷虾捕捞→船载加工→冷链运输→岸基仓储→虾肉产品检测
#   虾油     : 磷虾捕捞→船载加工→冷链运输→岸基仓储→全脂虾粉产品检测→虾油提取生产线→成品虾油产品检测
#   虾油胶囊 : 磷虾捕捞→船载加工→冷链运输→岸基仓储→全脂虾粉产品检测→虾油提取生产线→成品虾油产品检测→虾油胶囊封装
#   脱脂虾粉 : 磷虾捕捞→船载加工→冷链运输→岸基仓储→全脂虾粉产品检测→虾油提取生产线→脱脂虾粉产品检测
#   蛋白肽   : 磷虾捕捞→船载加工→冷链运输→岸基仓储→全脂虾粉产品检测→虾油提取生产线→脱脂虾粉产品检测→蛋白肽生产线
#
# ════════════════════════════════════════════════════════════════════════════
# ★ 编号 / 物料 / 取值参照金蝶 ERP 真实探测（mozi-int/scout，2026-06 只读实测）：
#   · 工单号    = SCDD-{YYMMDD}-{4位序}        （真实样例 SCDD-251031-0001 萃取工单）
#   · 原料磷虾粉批次 = {YYYYMM}                  （真实样例 202505，AM001 单批 331,300kg）
#   · 产品批号  = {YYMM}{3字母码}{2位序}          （真实样例 2602AKO03，质检子批 2602AKO03-1/-2）
#       AKM 全脂虾粉 · AKF 冻虾 · AKR 虾肉 · AKO 虾油 · ASO 上清液油 · AKP 脱脂虾粉 · AKC 虾油胶囊 · AKT 蛋白肽
#   · 真实物料编码（金蝶 FNumber，已探测核实）：
#       全脂虾粉(南极磷虾粉 AM001)  3-01-000-00001-1
#       虾油(磷虾油半成品/灌装)      2-00-000-00001-1
#       上清液油(南极磷虾膏固形物)    1-04-000-00001-1
#       脱脂虾粉(CP001)             1-05-000-00006-1
#       成品磷虾油(分级)            1-01-002/005/008-00001-1 · P40混批 1-03-001-00001-1
#   · 真实联产 BOM：磷虾粉×5kg → [主]磷虾油半成品×1kg + [联]上清液油 + [联]脱脂虾粉
#   · 真实出油率 p10/p50/p90 = 14.7%/18.0%/23.2%；磷脂≈42~50%(规格≥40/≥56)、EPA≈12%(规格≥10)、
#     DHA≈5.3%、虾青素≈300~540mg/kg(规格≥30/≥100)、酸价≈6.4(规格≤15)、过氧化值≈0.02(规格≤0.06)。
#   · 检测：成品 FQC{6位}、来料 IQC{6位}（金蝶 QM_InspectBill 真实编号风格）。
#
