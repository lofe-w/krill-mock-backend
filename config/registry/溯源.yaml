# 溯源 + 检测 注册表（B · 人工固定）
# 依据：domain.md §5 / 数据字典 §6 / 甲方 6.x（权威）
# ★溯源链条 = 有序数组（按事件顺序：捕捞→加工→冷链→仓储→[精加工]→检测）。
#   不用 JSON 对象(键无序)；每个元素 {环节, 批次编号, ...本环节具体数据}。
# ★环节内是【具体快照数值】(人工固定，照甲方 6.x)，不是内部 key 引用——
#   溯源数据是钉在该批次生产事件上的历史快照，与实时流是不同事实，故存具体值。
# ★批次编号是业务标识(可凭它再追溯)，保留；不暴露我方内部 key。

