# ============ A · 单一站立（人工固定） ============
- key: 工厂.信息
  表: A
  成熟度: 人工固定
  value: { 经度: 119.22, 纬度: 34.60, 地址: 连云港XX工业园区, 编号: LYG-001 }

- key: 工厂.虾油线.设计能力
  表: A
  成熟度: 人工固定
  value: { 全脂虾粉日处理量: 700, 典型日产量: 100, 典型年产量: 20000, 单位: 吨 }

- key: 工厂.蛋白肽线.设计能力
  表: A
  成熟度: 人工固定
  value: { 脱脂虾粉日处理量: 10, 典型日产量: 3, 典型年产量: 1000, 单位: 吨 }

# ============ C · 工厂天气（真值采集 open-meteo，落本地 SQLite） ============
- key: 工厂.天气.温度
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: ℃
  来源: { kind: open-meteo, 落库: sqlite, 字段: temperature_2m }

- key: 工厂.天气.湿度
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: "%"
  来源: { kind: open-meteo, 落库: sqlite, 字段: relative_humidity_2m }

- key: 工厂.天气.天气
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  来源: { kind: open-meteo, 落库: sqlite, 字段: weather_code }   # WMO 代码→晴/多云/雨…前端映射

# ============ C · 虾油提取线 设备工艺读数（规则生成） ============
- key: 工厂.虾油线.工艺读数
  表: C
  成熟度: 规则生成
  量语义: 瞬时
  网格: "*/5 * * * *"
  指标:
    逆流提取.虾粉进料速度:   { 单位: kg/h, 规则: { kind: 有界瞬时, 基线: 29000, 幅度: 3000, 区间: [0, 35000] } }
    逆流提取.乙醇进料速度:   { 单位: L/h,  规则: { kind: 有界瞬时, 基线: 5000, 幅度: 500, 区间: [0, 8000] } }
    逆流提取.乙醇浓度:       { 单位: "%",  规则: { kind: 有界瞬时, 基线: 95, 幅度: 1, 区间: [90, 99.5] } }
    逆流提取.提取温度:       { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 45, 幅度: 3, 区间: [30, 60] } }
    MVR2500.真空度:          { 单位: kPa,  规则: { kind: 有界瞬时, 基线: -85, 幅度: 5, 区间: [-100, -60] } }
    MVR2500.进料速度:        { 单位: kg/h, 规则: { kind: 有界瞬时, 基线: 2500, 幅度: 300, 区间: [0, 3500] } }
    MVR2500.蒸发温度:        { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 60, 幅度: 4, 区间: [40, 80] } }
    MVR2500.出料固形量:      { 单位: "%",  规则: { kind: 有界瞬时, 基线: 40, 幅度: 5, 区间: [20, 60] } }
    MVR3000.真空度:          { 单位: kPa,  规则: { kind: 有界瞬时, 基线: -85, 幅度: 5, 区间: [-100, -60] } }
    MVR3000.进料速度:        { 单位: kg/h, 规则: { kind: 有界瞬时, 基线: 3000, 幅度: 300, 区间: [0, 4000] } }
    MVR3000.蒸发温度:        { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 60, 幅度: 4, 区间: [40, 80] } }
    MVR3000.出料固形量:      { 单位: "%",  规则: { kind: 有界瞬时, 基线: 45, 幅度: 5, 区间: [20, 65] } }
    醇沉.醇沉温度:           { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 5,  幅度: 3, 区间: [-5, 20] } }
    醇沉.{固形量,浓缩液量,无水乙醇量,纯水添加量}: { 说明: 同组瞬时量，单位/基线按工艺标定 }
    复溶.无水乙醇添加比例:   { 单位: "%",  规则: { kind: 有界瞬时, 基线: 30, 幅度: 5, 区间: [10, 50] } }
    刮板浓缩.{真空度,蒸发温度,固形量}:   { 说明: 瞬时，参 MVR }
    球形浓缩.{真空度,蒸发温度,含水率}:   { 说明: 瞬时 }

# ============ C · 蛋白肽线 设备工艺读数（规则生成） ============
- key: 工厂.蛋白肽线.工艺读数
  表: C
