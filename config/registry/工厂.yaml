  网格: "0 * * * *"
  指标:
    耗电量:     { 量语义: 累计, 单位: kWh, 规则: { kind: 累计, 速率基线: 145, 起点: 当天起点 } }
    天然气用量: { 量语义: 累计, 单位: "m³", 规则: { kind: 累计, 速率基线: 50, 起点: 当天起点 } }
    水用量:     { 量语义: 累计, 单位: 吨, 规则: { kind: 累计, 速率基线: 3.5, 起点: 当天起点 } }

