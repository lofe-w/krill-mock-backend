  量语义: 瞬时
  网格: "*/5 * * * *"
  指标:
    进料预处理.进料量:       { 单位: kg/h, 规则: { kind: 有界瞬时, 基线: 420, 幅度: 50, 区间: [0, 600] } }
    进料预处理.虾粉清洗料液比: { 单位: "",  规则: { kind: 有界瞬时, 基线: 5, 幅度: 1, 区间: [2, 10] } }
    酶解.PH值:               { 单位: "",   规则: { kind: 有界瞬时, 基线: 7.0, 幅度: 0.5, 区间: [5, 9] } }
    酶解.酶解温度:           { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 55, 幅度: 3, 区间: [40, 65] } }
    酶解.时间:               { 单位: h,    规则: { kind: 有界瞬时, 基线: 4, 幅度: 0.5, 区间: [1, 8] } }
    酶解.酶制剂添加量:       { 单位: kg,   规则: { kind: 有界瞬时, 基线: 5, 幅度: 1, 区间: [0, 15] } }
    酶解.灭酶温度:           { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 90, 幅度: 3, 区间: [80, 100] } }
    脱色.活性炭添加比例:     { 单位: "%",  规则: { kind: 有界瞬时, 基线: 2, 幅度: 0.5, 区间: [0, 5] } }
    陶瓷膜纳滤.{透析加水量,物料温度}: { 说明: 瞬时 }
    纳滤浓缩.{透析加水量,物料温度,出料固形量}: { 说明: 瞬时 }
    三效浓缩.{真空度,蒸发温度,出料固形量}: { 说明: 瞬时 }
    喷雾干燥.进风温度:       { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 180, 幅度: 10, 区间: [150, 220] } }
    喷雾干燥.出风温度:       { 单位: ℃,   规则: { kind: 有界瞬时, 基线: 85, 幅度: 5, 区间: [60, 110] } }
    喷雾干燥.{进料速度,出料温度}:       { 说明: 瞬时 }
    渣粉干燥.{干燥温度,蒸汽压力,出料温度}: { 说明: 瞬时 }

# ============ C · 两线"生产数据"——消耗与产出（规则生成，累计/窗口 + 派生得率） ============
# 甲方 5.3/5.4/5.5：现实中是离散生产，但前端按窗口累计消费 → C。物料守恒见 constraints.yaml。
- key: 工厂.虾油线.生产数据
  表: C
  成熟度: 规则生成
  网格: "*/10 * * * *"
  指标:
    虾粉消耗量:     { 量语义: 累计, 单位: kg,  规则: { kind: 累计, 速率基线: 4860, 起点: 当天起点 } }   # ≈700吨/天
    无水乙醇消耗量: { 量语义: 累计, 单位: L,   规则: { kind: 累计, 速率基线: 850, 起点: 当天起点 } }
    纯水消耗量:     { 量语义: 累计, 单位: 吨,  规则: { kind: 累计, 速率基线: 0.06, 起点: 当天起点 } }
    天然气消耗量:   { 量语义: 累计, 单位: "m³", 规则: { kind: 累计, 速率基线: 2.1, 起点: 当天起点 } }
    蒸汽消耗量:     { 量语义: 累计, 单位: 吨,  规则: { kind: 累计, 速率基线: 0.035, 起点: 当天起点 } }
    耗电量:         { 量语义: 累计, 单位: kWh, 规则: { kind: 累计, 速率基线: 8.3, 起点: 当天起点 } }
    成品油产量:     { 量语义: 累计, 单位: kg,  规则: { kind: 累计, 速率基线: 694, 起点: 当天起点 }, 不变式: [INV-1, INV-5] }   # ≈100吨/天
    次品油产量:     { 量语义: 累计, 单位: kg,  规则: { kind: 累计, 速率基线: 10, 起点: 当天起点 } }
    虾油得率:       { 量语义: 瞬时, 单位: "%", 规则: { kind: 派生, 表达式: "成品油产量/虾粉消耗量*100" }, 不变式: [INV-2] }   # ≈12.5%
    逆流提取温度:   { 量语义: 瞬时, 单位: ℃,  规则: { kind: 有界瞬时, 基线: 45, 幅度: 3, 区间: [30, 60] } }
    车间环境.乙醇浓度: { 量语义: 瞬时, 单位: "%", 规则: { kind: 有界瞬时, 基线: 0.5, 幅度: 0.2, 区间: [0, 2] } }
    车间环境.温度:   { 量语义: 瞬时, 单位: ℃, 规则: { kind: 有界瞬时, 基线: 22, 幅度: 2, 区间: [15, 30] } }
    车间环境.湿度:   { 量语义: 瞬时, 单位: "%", 规则: { kind: 有界瞬时, 基线: 55, 幅度: 5, 区间: [40, 70] } }
    车间外大气.温度: { 量语义: 瞬时, 单位: ℃, 引用: 工厂.天气.温度 }
    车间外大气.湿度: { 量语义: 瞬时, 单位: "%", 引用: 工厂.天气.湿度 }

- key: 工厂.蛋白肽线.生产数据
  表: C
  成熟度: 规则生成
  网格: "*/10 * * * *"
  指标:
    脱脂虾粉消耗量: { 量语义: 累计, 单位: kg, 规则: { kind: 累计, 速率基线: 70, 起点: 当天起点 } }    # ≈10吨/天
    复合酶消耗量:   { 量语义: 累计, 单位: kg, 规则: { kind: 累计, 速率基线: 0.35, 起点: 当天起点 } }
    纯水消耗量:     { 量语义: 累计, 单位: 吨, 规则: { kind: 累计, 速率基线: 0.02, 起点: 当天起点 } }
    天然气消耗量:   { 量语义: 累计, 单位: "m³", 规则: { kind: 累计, 速率基线: 1.0, 起点: 当天起点 } }
    蒸汽消耗量:     { 量语义: 累计, 单位: 吨, 规则: { kind: 累计, 速率基线: 0.02, 起点: 当天起点 } }
    耗电量:         { 量语义: 累计, 单位: kWh, 规则: { kind: 累计, 速率基线: 5.6, 起点: 当天起点 } }
    蛋白肽产量:     { 量语义: 累计, 单位: kg, 规则: { kind: 累计, 速率基线: 21, 起点: 当天起点 }, 不变式: [INV-1, INV-5] }   # ≈3吨/天
    得率:           { 量语义: 瞬时, 单位: "%", 规则: { kind: 派生, 表达式: "蛋白肽产量/脱脂虾粉消耗量*100" }, 不变式: [INV-2] }
    酶解温度:       { 量语义: 瞬时, 单位: ℃, 规则: { kind: 有界瞬时, 基线: 55, 幅度: 3, 区间: [40, 65] } }
    酶解酸碱度:     { 量语义: 瞬时, 单位: "", 规则: { kind: 有界瞬时, 基线: 7.0, 幅度: 0.5, 区间: [5, 9] } }
    酶解时间:       { 量语义: 瞬时, 单位: h, 规则: { kind: 有界瞬时, 基线: 4, 幅度: 0.5, 区间: [1, 8] } }
    车间环境.{温度,湿度}: { 说明: 瞬时，参虾油线 }

