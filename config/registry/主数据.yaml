# ============ B · 设备台账（铭牌；运行状态/温度走 C 读数） ============
- key: 设备.台账
  表: B
  成熟度: 人工固定
  filter: [所属产线]
  条目:
    - filter: { 所属产线: 虾肉生产线 }
      value: { 设备名称: 平板速冻机, 所属工艺流程: 虾肉生产线, 所属工艺阶段: 速冻阶段 }
    - filter: { 所属产线: 虾粉生产线 }
      value: { 设备名称: 直接蒸煮器, 所属工艺流程: 虾粉生产线, 所属工艺阶段: 蒸煮阶段 }
  说明: 设备当前状态(运行中/待机/故障/维护中)、当前温度是时变 → 另走 C（设备状态读数）。

