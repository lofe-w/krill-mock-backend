# ============ B · 监控清单（真值采集 RTSP；地址由本系统流媒体提供） ============
- key: 监控.清单
  表: B
  成熟度: 真值采集
  filter: [所属]
  条目:
    - filter: { 所属: 磷虾船 }
      value: [ { 监控名称: 甲板监控, 地址: "rtsp://<本机>:8554/cam-甲板", 所属: 磷虾船 },
               { 监控名称: 加工车间, 地址: "rtsp://<本机>:8554/cam-加工", 所属: 磷虾船 } ]
    - filter: { 所属: 工厂 }
      value: [ { 监控名称: 厂区入口, 地址: "rtsp://<本机>:8554/cam-厂区", 所属: 工厂 },
               { 监控名称: 虾油车间, 地址: "rtsp://<本机>:8554/cam-虾油", 所属: 工厂 } ]
  说明: 视频字节由播放器直连 RTSP，不经后端；片源/路数见 sources.yaml。

