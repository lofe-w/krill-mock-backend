- key: 仓储
  表: B                       # B/A 待 Q1（整体取→A）
  成熟度: 人工固定
  filter: [仓库类别, 商品编号]
  条目:
    - filter: { 仓库类别: 深蓝号冻虾舱 }
      value: { 货物名称: 冻虾, 批号: SLHDX-2026-001, 数量: 3000, 单位: kg, 规格: "10kg/箱",
               保质期: "2027-06-18", 生产日期: "2026-06-15", 入库日期: "2026-06-16", 出库日期: "", 冷藏状态: 正常 }
    - filter: { 仓库类别: 工厂冷库 }
      value: { 货物名称: 全脂虾粉, 批号: GCLL-2026-001, 数量: 5000, 单位: kg, 规格: "25kg/袋",
               保质期: "2027-06-18", 生产日期: "2026-06-01", 入库日期: "2026-06-10", 出库日期: "2026-06-20", 冷藏状态: 正常,
