# ============ C · 航行 / 海况（真值采集，待对接 TSDB；含规则兜底） ============
# 来源连接见 config/sources.yaml；TSDB 表结构待 Q5；未对接前用 fallback 规则跑通。
- key: 船舶.航行.经度
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: "°"
  来源: { kind: timescaledb, 列: lon }
  fallback: { kind: 航迹, 通道: lon }   # 见造数引擎 §4.5（位置派生）

- key: 船舶.航行.纬度
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: "°"
  来源: { kind: timescaledb, 列: lat }
  fallback: { kind: 航迹, 通道: lat }

- key: 船舶.航行.航速
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: kn
  来源: { kind: timescaledb, 列: speed }
  fallback: { kind: 航迹派生, 来源位置: [船舶.航行.经度, 船舶.航行.纬度] }   # 由坐标差分派生

- key: 船舶.航行.艏向
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: "°"
  来源: { kind: timescaledb, 列: heading }
  fallback: { kind: 航迹派生 }

- key: 船舶.海况.海水温度
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: ℃
  来源: { kind: timescaledb, 列: sst }
  fallback: { 规则: { kind: 有界瞬时, 基线: 2.5, 幅度: 1.0, base_period: 360, 季节: { 振幅: 1.0, 周期: 年 }, 区间: [-2, 30] } }

- key: 船舶.海况.有义波高
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: m
  来源: { kind: timescaledb, 列: wave_height }
  fallback: { 规则: { kind: 有界瞬时, 基线: 3.5, 幅度: 1.5, base_period: 180, 区间: [0, 30], 潜变量: 海况 } }

- key: 船舶.海况.风速
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: m/s
  来源: { kind: timescaledb, 列: wind_speed }
  fallback: { 规则: { kind: 有界瞬时, 基线: 8, 幅度: 4, base_period: 180, 区间: [0, 50], 潜变量: 海况 } }

- key: 船舶.海况.风向
  表: C
  成熟度: 真值采集
  量语义: 瞬时
  单位: "°"
  来源: { kind: timescaledb, 列: wind_dir }
  fallback: { 规则: { kind: 有界瞬时, 基线: 180, 幅度: 180, 区间: [0, 360] } }

- key: 船舶.海况.{天气, 海况等级, 风级, 大气温度, 表面流速流向, 海冰, 叶绿素}
  表: C
  成熟度: 真值采集
  说明: 同上，来源 timescaledb 对应列；海冰/叶绿素是否有真值源待 Q3，否则退规则生成。
  来源: { kind: timescaledb }

# ============ C · 磷虾捕捞（规则生成） ============
