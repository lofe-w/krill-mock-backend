# ============ C · 航行（当前规则生成·航迹；目标真值采集 TSDB） ============
# 一个 航迹 生成器产出 经纬度/航向/航速（派生一致，造数引擎 §4.5）。
- key: 船舶.航行
  表: C
  成熟度: 规则生成
  目标成熟度: 真值采集        # 远程 TimescaleDB 透传（待 Q5 表结构 / sources.yaml）
  量语义: 瞬时
  网格: "*/3 * * * *"
  规则:
    kind: 航迹
    # 南设得兰群岛—布兰斯菲尔德海峡磷虾作业区；按捕捞船低速往返作业航迹布点。
    航点:
      - { 经度: -58.4200, 纬度: -62.1800 }
      - { 经度: -58.0500, 纬度: -62.3200 }
      - { 经度: -57.6200, 纬度: -62.5500 }
      - { 经度: -57.9000, 纬度: -62.7800 }
      - { 经度: -58.3600, 纬度: -62.6100 }
      - { 经度: -58.7200, 纬度: -62.3500 }
    漂移: 0.008
    base_period: 720
    Δ: 180                  # 3min，用于由位置差分派生航速/航向
  产出: [经度, 纬度, 航速, 航向]     # 单位：°、°、kn、°；航迹=位置时序连线
  区间: { 经度: [-180, 180], 纬度: [-90, 90], 航速: [0, 30], 航向: [0, 360] }

