  表: C
  成熟度: 规则生成
  量语义: 累计
  网格: "*/3 * * * *"          # 预设：每 3min 一点
  单位: kg
  规则: { kind: 累计, 速率基线: 730, 漂移幅度: 50000, base_period: 1440, 起点: 渔季起点 }
