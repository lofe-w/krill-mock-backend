# 约束 / 派生层（跨 key，单 key 声明装不下）
# 依据：domain.md §6 / 数据字典 §7 / 配置与取数契约 §3
# 由 resolver 在求值期套用；实现策略（A 结构性派生优先于 B 钳制）见 造数引擎 §5。
# 原则：选独立基准，其余按构造派生 → 约束成代数恒等式，而非碰运气。

# INV-1 物料守恒：捕捞量 ≥ 三线投料之和
物料守恒.捕捞:
  基准: [船舶.捕捞.累计产量.拖网, 船舶.捕捞.累计产量.泵吸]   # Σ 为总捕捞
  下游: [船舶.虾粉线.流量秤.当天累计, 船舶.冻虾线.流量秤.当天累计, 船舶.虾肉线.流量秤.当天累计]
  约束: "Σ下游(当窗口) ≤ Σ基准(当窗口)"
  策略: 投料按总捕捞的份额派生（Σ份额 ≤ 1）

# INV-1 + INV-2 物料守恒 + 得率派生（虾油线，挂在 C 累计上）
# 份额据金蝶真实标定：出油率≈18%(p10/p50/p90=14.7/18/23.2)，BOM 5:1；联产上清液油+脱脂虾粉(CP001)
物料守恒.虾油线:
  基准: 工厂.虾油线.生产数据.虾粉消耗量            # 独立基准（累计）
  产出份额:                                       # Σ份额 ≤ 1，平滑噪声归一
    工厂.虾油线.生产数据.成品油产量: { 基线: 0.18, 区间: [0.134, 0.27] }  # 金蝶真实出油率
    工厂.虾油线.生产数据.上清液油产量: { 基线: 0.01 }                     # 联产品(磷脂↑则上清液↓，负相关)
    脱脂虾粉产出:                  { 基线: 0.75 }   # 主副产 CP001
    回收无水酒精:                  { 基线: 0.05 }
  得率派生: { key: 工厂.虾油线.生产数据.虾油得率, 定义: "成品油产量 / 虾粉消耗量 * 100" }   # INV-2
  软相关: "上清液油产量↑ → 半成品磷脂含量↓（金蝶真实：上清液2000kg批磷脂骤降至49.7%）"

# INV-1 + INV-2 蛋白肽线
物料守恒.蛋白肽线:
  基准: 工厂.蛋白肽线.生产数据.脱脂虾粉消耗量
  产出份额:
    工厂.蛋白肽线.生产数据.蛋白肽产量: { 基线: 0.30 }   # ≈3/10
    渣粉产出:                        { 基线: 0.65 }
  得率派生: { key: 工厂.蛋白肽线.生产数据.得率, 定义: "蛋白肽产量 / 脱脂虾粉消耗量 * 100" }

# INV-2 船载三线得率派生（= 产出累计 / 投料累计；非独立 kind）
得率.虾粉线: { key: 船舶.虾粉线.工艺读数.虾粉得率, 定义: "船舶.虾粉线.打包.当天累计重量 / 船舶.虾粉线.流量秤.当天累计 * 100", 区间: [40, 50] }
得率.虾肉线: { key: 船舶.虾肉线.工艺读数.虾肉得率, 定义: "船舶.虾肉线.打包.当天累计重量 / 船舶.虾肉线.流量秤.当天累计 * 100", 区间: [30, 40] }

# 百分比派生（占满量百分比；非独立 kind，由派生求）
百分比派生:
  - { key: 船舶.能耗.剩余燃油百分比, 定义: "船舶.能耗.剩余燃油 / 1000 * 100" }   # 满油量=1000吨

# INV-3 谱系无环：回收无水酒精按新批次入账、不回指上游（防环）
谱系无环:
  方向: 成品→原料（仅向上游回溯）
  规则: 回收无水酒精作为新批次进入下一批投入，不在谱系里回指其来源批次

# INV-4 冷链/温度安全 + 时序因果
温度链:
  约束:
    - "检测#冻块中心温度 ≤ 船舶.冻虾舱.温度"          # 中心温度 ≤ 冷库温度
    - "平板速冻机.出冻温度 ≤ 平板速冻机.入冻温度 的安全区间"
  时间因果: "捕捞 ≤ 加工 ≤ 冷链 ≤ 仓储 ≤ 检测"        # 溯源各环节时间单调

# INV-5 实际产量 ≤ 设计能力（上界 clamp）
上界:
  单位换算: 设计能力为吨、累计量为kg，比较时 ×1000
  清单:
    - { 受约束: 船舶.捕捞.累计产量.泵吸, 渔季上界: 船舶.桁杆泵吸系统.设计能力.典型渔季产量 }
    - { 受约束: 船舶.捕捞.累计产量.拖网, 渔季上界: 船舶.传统拖网系统.设计能力.典型渔季产量 }
    - { 受约束: 船舶.虾粉线.打包.当天累计重量, 日上界: 船舶.虾粉线.设计能力.典型日产量 }
    - { 受约束: 工厂.虾油线.生产数据.成品油产量, 日上界: 工厂.虾油线.设计能力.典型日产量 }
    - { 受约束: 工厂.蛋白肽线.生产数据.蛋白肽产量, 日上界: 工厂.蛋白肽线.设计能力.典型日产量 }

# INV-6 成分自洽：相邻环节同物成分连续（共享潜变量/派生）
成分自洽:
  示例: "脱脂虾粉作为蛋白肽原料，其磷脂/蛋白成分 ↔ 虾油线产出的脱脂虾粉成分 应连续"
  策略: 共享潜变量；检测值与生产数据成分由同一基准派生
