# 覆盖 / 冻结 / 兜底（一物三用）
# 依据：domain.md §6 实现注 / 造数引擎 §10
# 命中时直接返回，跳过规则计算。用途：
#   ① 演示剧情注入（某天某设备故障）
#   ② 把某段历史"钉死"为固定值（演示/截图/对账）
#   ③ provider 型 key 数据源不可用时的兜底值

# 命中时 value 原样替换该点的取值（见 resolver._check_override / _emit）：
#   · 覆盖对象必须是 C 时序 key（override 只在时序求值期命中；B 表台账为静态，覆盖不生效）。
#   · value 直接给"点值本身"（标量），而非 { 值/单位 } 包装——单位由 registry 决定。
#   · 仅按 key + range 命中，不支持 filter 作用域。
overrides:
  # 示例①：剧情——某日虾肉生产线速冻机故障（覆盖对应的 C·离散状态 key，返回"故障"）
  - key: 船舶.虾肉生产线.平板速冻机.状态
    range: ["2026-06-20 00:00:00", "2026-06-20 23:59:59"]
    value: 故障

  # 示例②：冻结某段历史温度（演示截图用）
  # - key: 船舶.冻虾舱.温度
  #   range: ["2026-06-18 00:00:00", "2026-06-18 23:59:59"]
  #   value: -18.0

  # 示例③：真值源不可用时的兜底（也可改用 registry 里的 fallback 规则）
  # - key: 工厂.天气.温度
  #   range: ["*", "*"]
  #   value: 25
