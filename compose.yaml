# 磷虾大屏数据后端 · 编排
# 启动：docker compose up -d --build
# 验收：浏览器开 http://localhost:8000/docs（Swagger 交互），或见 docs/03-运行与验收.md
services:
  api:
    build: .
    image: krill-mock-backend:dev
    container_name: krill-mock-api
    ports:
      - "8000:8000"
    volumes:
      # 挂 config 进去：改完 config/*.yaml 调 POST /api/reload 即生效，无需重启
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

